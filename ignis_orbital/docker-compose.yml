services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ignis-rabbitmq
    ports:
      - "5672:5672"     # protocolo AMQP (aplicacao)
      - "15672:15672"   # console de gerenciamento (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
