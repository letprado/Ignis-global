spring.application.name=ignis-orbital
server.port=${PORT:8080}

# Oracle Database (FIAP - SID orcl)
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:orcl}
spring.datasource.username=${ORACLE_USER:rm559258}
spring.datasource.password=${ORACLE_PASSWORD:170904}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
ignis.jwt.secret=${JWT_SECRET:ignis-orbital-jwt-secret-key-minimo-256-bits-para-hs256-seguro}
ignis.jwt.expiration-ms=86400000

# CORS
ignis.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# RabbitMQ (mensageria assincrona de telemetria)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
ignis.messaging.telemetria-queue=ignis.telemetria.processamento
ignis.messaging.enabled=${MESSAGING_ENABLED:false}

# Spring AI (OpenAI - opcional)
# Por padrao os modelos de IA ficam desligados, para a app subir sem OPENAI_API_KEY.
# Para ativar o assistente real: defina OPENAI_API_KEY e AI_CHAT=openai
spring.ai.model.chat=${AI_CHAT:none}
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none
spring.ai.openai.api-key=${OPENAI_API_KEY:not-set}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}

# Open-Meteo (cliente Feign - contexto climatico)
ignis.openmeteo.base-url=https://api.open-meteo.com

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Cache
spring.cache.type=simple
